# Sources used by the ai-builder theme. Ported verbatim from config.json
# sources block + the phison-aidaptiv sources_overlay (since the operator
# works at Phison and these feeds are part of the day-to-day brief).
#
# Format mirrors config.json so the port is mechanical. Future themes may
# diverge entirely.

# Self-hosted RSSHub (docker/aggregator). The native-RSS feeds are ingested via
# Miniflux (feeds.opml); only the RSSHub-dependent chains (dev-to-top,
# anthropic-news, hackernews, hf-daily-papers) use this, and they fall through to
# jina/firecrawl if it is down. No public instances — escapes public-instance drift.
rsshub_urls:
  - http://localhost:1200

github_developers:
  enabled: true
  global_limit: 100
  global_min_followers: 1000
  regions:
    - name: taiwan
      locations: [taiwan, taipei]
      limit: 50
      min_followers: 50
  new_repo_window_hours: 72

# Catalog-walk ("精選"): walk the catalog of established 30k+ star repos,
# AI-first with a small general bucket. min_stars is the quality floor (tunable);
# the curator + the seen-repos ledger are the real filters. See
# docs/superpowers/specs/2026-06-08-catalog-walk-design.md.
github_catalog:
  enabled: true
  min_stars: 30000
  ai_pool_size: 40
  general_pool_size: 15
  per_topic: 30

# Phison-specific sources (formerly under config.json lenses[1].sources_overlay).
# These belong to the ai-builder theme because the operator uses this brief
# for Phison aiDAPTIV+ work; they are not a separate lens.
phison_overlay:
  enabled: true
  github_topics:
    topics: [kv-cache, local-llm, on-device-ai, llm-app]
  sources:
    - id: phison-blog
      label: Phison Blog
      category: phison-vendor
      itemType: rss-post
      chain:
        - provider: native-rss
          config:
            url: https://phisonblog.com/feed/
            sourceName: phison-blog
            category: phison-vendor
        - provider: jina-reader
          config:
            url: https://phisonblog.com/
            sourceName: phison-blog
            category: phison-vendor
        - provider: firecrawl
          config:
            url: https://phisonblog.com/
            sourceName: phison-blog
            category: phison-vendor

    - id: vllm-releases
      label: vLLM Releases
      category: kv-cache-research
      itemType: rss-post
      chain:
        - provider: native-rss
          config:
            url: https://github.com/vllm-project/vllm/releases.atom
            sourceName: vllm-releases
            category: kv-cache-research
        - provider: jina-reader
          config:
            url: https://github.com/vllm-project/vllm/releases
            sourceName: vllm-releases
            category: kv-cache-research

    - id: lmcache-releases
      label: LMCache Releases
      category: kv-cache-research
      itemType: rss-post
      chain:
        - provider: native-rss
          config:
            url: https://github.com/LMCache/LMCache/releases.atom
            sourceName: lmcache-releases
            category: kv-cache-research
        - provider: jina-reader
          config:
            url: https://github.com/LMCache/LMCache/releases
            sourceName: lmcache-releases
            category: kv-cache-research

    # nvidia-developer removed 2026-05-25: same feed URL as the base registry's
    # `nvidia-developer-blog` (大廠技術), so the fetcher deduped it to 0 every
    # run. NVIDIA Developer Blog content still arrives via the base source.

    - id: sk-hynix-news
      label: SK Hynix News
      category: ssd-vendor
      itemType: rss-post
      chain:
        - provider: native-rss
          config:
            url: https://news.skhynix.com/feed/
            sourceName: sk-hynix-news
            category: ssd-vendor
        - provider: jina-reader
          config:
            url: https://news.skhynix.com/
            sourceName: sk-hynix-news
            category: ssd-vendor
        - provider: firecrawl
          config:
            url: https://news.skhynix.com/
            sourceName: sk-hynix-news
            category: ssd-vendor

    - id: blocksandfiles
      label: BlocksAndFiles
      category: ssd-vendor
      itemType: rss-post
      chain:
        - provider: native-rss
          config:
            url: https://blocksandfiles.com/feed/
            sourceName: blocksandfiles
            category: ssd-vendor
        - provider: jina-reader
          config:
            url: https://blocksandfiles.com/
            sourceName: blocksandfiles
            category: ssd-vendor
        - provider: firecrawl
          config:
            url: https://blocksandfiles.com/
            sourceName: blocksandfiles
            category: ssd-vendor
