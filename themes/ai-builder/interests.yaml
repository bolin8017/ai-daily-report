# ─────────────────────────────────────────────────────────────────────────
# Interest subscription registry  ·  ai-builder theme
# ─────────────────────────────────────────────────────────────────────────
# DRAFT — not yet wired into the pipeline. This file is the single place to
# manage "what the brief pays attention to". Wiring it in (so it drives the
# GitHub topic search + arxiv topic-lock) is part of the condense-redesign
# implementation plan.
#
# To subscribe/unsubscribe a topic, edit its `level:`
#   core     = every day (always fetched / searched / keyword-locked)
#   rotating = sampled — `rotation.rotating_per_day` of them per day
#   off      = ignored entirely
#
# Each topic may drive:
#   github: [...]  → GitHub topic search terms
#   arxiv:  [...]  → arxiv search-query keywords (topic-lock)
#   note:          → source-backed interests (driven by feeds, not search)
#
# Curated 2026-06-05 with the operator. Core = AI agents (current main work)
# + foundations (RAG/LLM). Phison aiDAPTIV+ memory/KV-cache and everything
# else rotate. Closed: robotics/embodied/VLA, AI-safety/policy, consumer
# media (voice/image).

rotation:
  rotating_per_day: 3
  seed_field: date

interests:
  # ── Agents  (PRIMARY focus — current main work) → CORE ────────────────
  agent:              { level: core,     label: "AI Agent",                github: [agent, ai-agent],            arxiv: ["LLM agent", agentic] }
  agent-memory:       { level: core,     label: "Agent 記憶體/記憶管理",    github: [agent-memory, llm-memory],   arxiv: ["agent memory", "long-term memory", "memory-augmented", "episodic memory"] }
  agent-applications: { level: core,     label: "Agent 應用 / agentic 工作流", github: [autonomous-agents, ai-agent], arxiv: ["agentic workflow", "LLM agents", "autonomous agent", "tool use"] }
  multi-agent:        { level: core,     label: "多 Agent 協作",            github: [multi-agent],                arxiv: ["multi-agent", "multi agent"] }
  mcp:                { level: core,     label: "MCP (Model Context Protocol)", github: [mcp, model-context-protocol], arxiv: ["model context protocol"] }
  ai-coding:          { level: core,     label: "AI 寫程式 / coding agents", github: [ai-coding, code-generation], arxiv: ["code generation", "coding agent", "code LLM"] }

  # ── Foundational for agents → CORE ────────────────────────────────────
  rag:                { level: core,     label: "RAG / 檢索增強",           github: [rag],                        arxiv: [retrieval, RAG, "retrieval-augmented"] }
  llm:                { level: core,     label: "LLM (通用)",              github: [llm],                        arxiv: ["large language model"] }

  # ── Phison aiDAPTIV+ memory/KV-cache  (job) → ROTATING ────────────────
  aidaptiv-offload:   { level: rotating, label: "aiDAPTIV+ / KV-cache 卸載", note: "source-backed: vllm-releases, lmcache-releases, aidaptiv-phison-releases", arxiv: ["kv cache offload", "memory-augmented LLM", "CPU offload", "SSD LLM"] }
  kv-cache:           { level: rotating, label: "KV-cache",                github: [kv-cache],                   arxiv: ["kv cache", "kv-cache", "paged attention"] }
  memory-storage-vendors: { level: rotating, label: "記憶體/SSD 廠商",       note: "source-backed: phison-blog, sk-hynix-news, blocksandfiles", github: [], arxiv: [] }

  # ── Web data & scraping  (incl. anti-detection / bypass) → ROTATING ───
  web-scraping:       { level: rotating, label: "網路爬蟲 / 抓取",          github: [web-scraping, scraping, crawler, crawling], arxiv: [] }
  scraping-evasion:   { level: rotating, label: "爬蟲反偵測 / 繞過檢測",     github: [anti-bot, bot-detection, cloudflare-bypass, captcha-solver, stealth], arxiv: [] }
  browser-automation: { level: rotating, label: "瀏覽器自動化 / web agent",  github: [browser-automation],         arxiv: ["web agent", "GUI agent"] }
  computer-use:       { level: rotating, label: "Computer use",             github: [computer-use],               arxiv: ["computer use", "GUI agent"] }

  # ── Retrieval & context → ROTATING ────────────────────────────────────
  long-context:       { level: rotating, label: "長上下文",                 github: [long-context],               arxiv: ["long context", "context window", "long-context"] }
  context-engineering: { level: rotating, label: "Context engineering",      github: [],                           arxiv: ["context engineering", "in-context"] }
  vector-database:    { level: rotating, label: "向量資料庫",               github: [vector-database],            arxiv: ["vector search", "approximate nearest neighbor"] }
  embedding:          { level: rotating, label: "Embedding",                github: [embedding],                  arxiv: [embedding, "representation learning"] }
