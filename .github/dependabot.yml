version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
      include: scope

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
    ignore:
      # Pin node to the 22.x LTS line ("Jod", supported until 2027-04).
      # Odd-numbered releases (23, 25, …) are "Current" — non-LTS, replaced
      # every 6 months. A daily production pipeline should stay on LTS;
      # Dependabot will still open PRs for digest updates inside 22.x.
      - dependency-name: node
        update-types:
          - version-update:semver-major
