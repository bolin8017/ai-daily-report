name: CI / Deploy to Pages

# Two responsibilities in one workflow:
#   - on pull_request: validate the change (lint + test + schema + 11ty
#     build) before merge so we don't find out at deploy time
#   - on push to main, scheduled cron (21:00 UTC daily), or manual
#     workflow_dispatch: validate, then deploy to Pages. The daily cron
#     is the primary auto-deploy path — pushes to the `data` orphan
#     branch cannot themselves fire this workflow (no .github/workflows/
#     tree on that branch). See the `schedule:` block below for detail.
#
# This workflow only consumes trusted inputs:
# - actions/checkout (no untrusted code execution)
# - npm ci against committed package-lock.json
# - 11ty build against committed templates
# No github.event.*, no PR/issue body parsing, no untrusted user input.
# (PRs from forks are not a concern — single-owner repo.)

# Opt into Node.js 24 for the bundled JavaScript actions (checkout,
# setup-node, upload-pages-artifact, deploy-pages). GitHub will force
# this from 2026-06-02 and remove Node 20 from runners on 2026-09-16;
# setting it now silences the deprecation warnings and exercises the
# new runtime ahead of the cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    # `data` is intentionally omitted: the orphan branch has no
    # .github/workflows/ tree, so pushes there never reach Actions.
    # The `schedule:` trigger below is how `data`-branch artifacts
    # get picked up instead.
    branches: [main]
    paths:
      - 'data/**'
      - 'site/**'
      - 'eleventy.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  pull_request:
    # Wider net than `push`: also include source/test/script paths so
    # PR-only changes that don't affect deploy still get validated.
    paths:
      - 'data/**'
      - 'site/**'
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'eleventy.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'biome.json'
      - 'config.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
  schedule:
    # 21:00 UTC = 05:00 Asia/Taipei — ~1h after the VM pipeline starts
    # its daily run at 04:00 Asia/Taipei. Primary auto-deploy path:
    # pushes to the `data` orphan branch cannot trigger workflows
    # (no .github/workflows/ tree on that branch), so we poll on cron
    # and pull whatever reports are currently on `data`.
    - cron: '0 21 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # push: serialize all deploys against the shared `pages` group
  # pull_request: per-PR group so a new commit on the PR cancels the
  # in-flight validation instead of queueing
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'pages' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Hydrate data/ from data branch
        run: |
          set -euo pipefail
          git fetch --depth=1 origin data
          # 11ty only needs reports + memory + snapshot; staging stays
          # internal to the pipeline (avoids 1MB+ leak into Pages artifact).
          git checkout origin/data -- data/reports data/memory.json data/feeds-snapshot.json
          test -d data/reports || { echo "data branch missing data/reports/"; exit 1; }

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Validate data files against schemas
        run: |
          set -euo pipefail
          node src/lib/validate.js config config.json
          LATEST=$(ls -1 data/reports/*.json 2>/dev/null | sort -r | head -1 || true)
          if [ -n "$LATEST" ]; then
            node src/lib/validate.js report "$LATEST"
          fi
          node src/lib/validate.js memory data/memory.json

      - name: Build site with 11ty
        run: npx @11ty/eleventy

      - name: Verify build artifacts
        env:
          REPORT_TZ: ${{ vars.REPORT_TIMEZONE || 'Asia/Taipei' }}
        run: |
          set -euo pipefail
          test -s _site/index.html || { echo "11ty produced empty index.html"; exit 1; }
          LATEST=$(ls -1 data/reports/*.json 2>/dev/null | sort -r | head -1 || true)
          if [ -n "$LATEST" ]; then
            REPORT_DATE=$(jq -r '.date' "$LATEST")
            TODAY=$(TZ="$REPORT_TZ" date +%Y-%m-%d)
            if [ "$REPORT_DATE" != "$TODAY" ]; then
              echo "::warning::report date ($REPORT_DATE) does not match CI day ($TODAY)"
            fi
          fi

      - name: Upload Pages artifact
        # Skip on PR — nothing downstream consumes it
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    # Deploy on everything except PRs. PR validation ends after build
    # (no Pages publish from a feature branch); all other events —
    # push to main, the daily schedule cron, and manual
    # workflow_dispatch recovery — should actually publish.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
