name: CI / Deploy to Pages

# Two responsibilities in one workflow:
#   - on pull_request: validate the change (lint + test + schema + 11ty
#     build) before merge so we don't find out at deploy time
#   - on push to main, repository_dispatch (data-committed) from the
#     Hermes cron production pipeline, or manual workflow_dispatch:
#     validate, then deploy to Pages. The production pipeline's
#     repository_dispatch is the primary auto-deploy path — pushes to the
#     `data` orphan branch cannot themselves fire this workflow (no
#     .github/workflows/ tree on that branch), so the pipeline POSTs a
#     dispatch at the end of its daily run instead. See the
#     `repository_dispatch:` block below.
#
# This workflow only consumes trusted inputs:
# - actions/checkout (no untrusted code execution)
# - npm ci against committed package-lock.json
# - 11ty build against committed templates
# No github.event.*, no PR/issue body parsing, no untrusted user input.
# (PRs from forks are not a concern — single-owner repo.)

# Opt into Node.js 24 for the bundled JavaScript actions (checkout,
# setup-node, upload-pages-artifact, deploy-pages). GitHub will force
# this from 2026-06-02 and remove Node 20 from runners on 2026-09-16;
# setting it now silences the deprecation warnings and exercises the
# new runtime ahead of the cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    # `data` is intentionally omitted: the orphan branch has no
    # .github/workflows/ tree, so pushes there never reach Actions.
    # The `repository_dispatch:` trigger below is how `data`-branch
    # artifacts get picked up instead (POSTed by the production pipeline after each run).
    #
    # Paths mirror the `pull_request` set (src/tests/scripts/biome/config
    # included), not just deploy-relevant ones. A narrower push filter let a
    # code/test commit touching only src/**, tests/**, or scripts/** land on
    # main WITHOUT firing this workflow, so a lint/test regression could sit on
    # main untested until the next data-committed dispatch surfaced it as a
    # *deploy* failure (see the broken Pages build from the 13af6b7 direct push).
    # Validating the same paths on push as on PR closes that gap. Such pushes
    # also redeploy Pages (the deploy job runs on every non-PR event), which is
    # harmless and idempotent: the build always hydrates the latest reports from
    # the data branch, so a code-only push republishes the current data.
    branches: [main]
    paths:
      - 'data/**'
      - 'site/**'
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      # themes/** is a build input, not just prompts: report.js dynamically
      # imports themes/<theme>/sections/*/schema.js for validation, and
      # eleventy.config.js reads the theme YAML — a theme-only change must
      # trigger validate + build + redeploy like any src change.
      - 'themes/**'
      - 'eleventy.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'biome.json'
      - 'config.json'
      - '.github/workflows/deploy.yml'
  pull_request:
    # Wider net than `push`: also include source/test/script paths so
    # PR-only changes that don't affect deploy still get validated.
    paths:
      - 'data/**'
      - 'site/**'
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'themes/**'
      - 'eleventy.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'biome.json'
      - 'config.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
  repository_dispatch:
    # Primary auto-deploy path. The Hermes cron production pipeline (07:00
    # Asia/Taipei) POSTs this event at the end of its daily run, right
    # after the new report is committed and pushed to the `data` branch.
    # This replaces the old `schedule: 0 0 * * *` poll: pushes to the
    # orphan `data` branch can't fire workflows, and GitHub's cron drifted
    # by hours (schedule jitter) so the published site lagged the report by
    # most of a morning. An explicit dispatch fires the deploy within
    # seconds of the data landing. repository_dispatch always runs against
    # the default branch (main) and needs only the Contents:write token
    # scope the pipeline already uses to push — no extra scope, no workflow
    # file on `data`.
    types: [data-committed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # push: serialize all deploys against the shared `pages` group
  # pull_request: per-PR group so a new commit on the PR cancels the
  # in-flight validation instead of queueing
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'pages' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Use PR head SHA on pull_request so CI validates the PR's actual
          # changes; fall back to main for push / repository_dispatch / workflow_dispatch.
          # Without this fallback, PR-context CI tests main's code (not the
          # PR's), which makes PR validation meaningless and lets regressions
          # land — exactly what bit us when the strict v2 ReportSchema rejected
          # yesterday's v1.x report after #30 merged.
          ref: ${{ github.event.pull_request.head.sha || 'main' }}

      - name: Hydrate data/ from data branch
        run: |
          set -euo pipefail
          git fetch --depth=1 origin data
          # Required: 11ty cannot build the archive without the reports. Each
          # path is checked out separately so a missing optional file can never
          # poison the required reports checkout — bundling them into one atomic
          # `git checkout` pathspec is what broke the data-committed deploy when
          # data/memory.json was retired (the missing pathspec failed the whole
          # checkout, taking reports down with it; see #70).
          git checkout origin/data -- data/reports
          test -d data/reports || { echo "data branch missing data/reports/"; exit 1; }
          # Expected every run (Stage 4 overwrites it; the footer reads it at
          # build time). Non-fatal if absent so a snapshot hiccup never blocks a
          # deploy, but surface it so a silently stale/empty footer is visible.
          if git checkout origin/data -- data/feeds-snapshot.json 2>/dev/null; then
            echo "feeds-snapshot.json hydrated"
          else
            echo "::warning::data/feeds-snapshot.json absent on data branch — footer will render stale/empty"
          fi
          if git checkout origin/data -- data/star-history.json 2>/dev/null; then
            echo "star-history.json hydrated"
          else
            echo "::warning::data/star-history.json absent on data branch — velocity ranking stays cold until it accrues"
          fi
          if git checkout origin/data -- data/leaderboard-snapshots.json 2>/dev/null; then
            echo "leaderboard-snapshots.json hydrated"
          else
            echo "::warning::data/leaderboard-snapshots.json absent on data branch — leaderboards surface once then settle"
          fi

      - name: Hydrate cold archive from Releases
        # Phase 3 pipeline redesign — once FEATURE_ARCHIVE_HOT_COLD=1 is in
        # effect, data branch only holds last HOT_DAYS of reports; older
        # months live in GitHub Releases as archive-YYYY-MM tags. Pull
        # the last 12 months back into data/reports/ so 11ty pagination
        # has the full year. Best-effort: missing archives are OK
        # (early days when no archive yet exists).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HYDRATE_MONTHS: '12'
        run: |
          bash scripts/hydrate-archive.sh || echo "[hydrate-archive] non-fatal failure — continuing build"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      # docs/data-sources.md is documented as kept in sync with the theme's
      # sources.yaml by this check — without running it in CI the sync claim
      # is unenforced and drift accumulates silently.
      - name: Check data-sources doc sync
        run: npm run check:sources

      - name: Validate data files against schemas
        run: |
          set -euo pipefail
          node src/lib/validate.js config config.json
          LATEST=$(ls -1 data/reports/*.json 2>/dev/null | sort -r | head -1 || true)
          if [ -n "$LATEST" ]; then
            node src/lib/validate.js report "$LATEST"
          fi

      - name: Build site with 11ty
        run: npx @11ty/eleventy

      - name: Verify build artifacts
        env:
          REPORT_TZ: ${{ vars.REPORT_TIMEZONE || 'Asia/Taipei' }}
        run: |
          set -euo pipefail
          test -s _site/index.html || { echo "11ty produced empty index.html"; exit 1; }
          LATEST=$(ls -1 data/reports/*.json 2>/dev/null | sort -r | head -1 || true)
          if [ -n "$LATEST" ]; then
            REPORT_DATE=$(jq -r '.date' "$LATEST")
            TODAY=$(TZ="$REPORT_TZ" date +%Y-%m-%d)
            if [ "$REPORT_DATE" != "$TODAY" ]; then
              echo "::warning::report date ($REPORT_DATE) does not match CI day ($TODAY)"
            fi
          fi

      - name: Upload Pages artifact
        # Skip on PR — nothing downstream consumes it
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    # Deploy on everything except PRs. PR validation ends after build
    # (no Pages publish from a feature branch); all other events —
    # push to main, the production pipeline's daily repository_dispatch,
    # and manual workflow_dispatch recovery — should actually publish.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
